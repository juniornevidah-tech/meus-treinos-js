<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema De Login Fake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="Escondido2">
    <div class="InformaçoesCadastrar">
        <h1>Sitema De Login Fake</h1>
        <h2>Seja Bem Vindo Ao Sistema de Login</h2>
        <hr>
        Nome: <input type="text" id="nome" placeholder="Digite um nome">
        Email: <input type="email" id="Email" placeholder="Digite um email">
        Senha: <input type="password" id="Senha" placeholder="Digite uma Senha">
        <button id="Cadastrar">cadastrar</button>
    </div>
    </div>
    <div class="Botao">
        <h3>Fazer Login</h3>
        <button onclick="AreaDeLogin()">Fazer Login</button>

    <div class="Escondido">
    <br>

    <div class="Login">
        Email: <input type="email" id="Emailprin">

        Senha: <input type="password" id="Senhaprin">

        <div class="BotaoDelogin">
        <button onclick="OutraAreadeLogin()">Login</button>

        <br>
        <h2>Criar uma Conta</h2>

        <button onclick="cadastra()">
            Criar uma Conta
        </button>

    </div>
    </div>
    </div>
    </div>
    <div class="Escondeinformaçoes">
        <div class="Informaçoesdapessoa">
        <h1 id="ola">Seja bem vindo</h1>

        <p id="pessoas"></p>
    </div>
    </div>
</body>
<script src="projetoSistema.js"></script>
</html>
